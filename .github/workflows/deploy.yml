name: Deploy Daruttafsir Project

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            # Masuk ke folder root project di server (sesuaikan nama folder jika bukan daruttafsir)
            cd /home/u751837275/domains/santriqu.id/public_html/daruttafsir
            
            # Mode maintenance saat proses deploy
            php artisan down || true
            
            git pull origin main
            /opt/php83/bin/php /usr/local/bin/composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev
            /opt/php83/bin/php artisan migrate --force
            /opt/php83/bin/php artisan optimize:clear
            
            # Bersihkan dan buat ulang cache laravel
            php artisan optimize:clear
            php artisan optimize